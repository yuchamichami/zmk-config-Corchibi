          </radialGradient>
        </defs>
        <rect x="2" y="2" width="92" height="92" fill="#ffffff" stroke="#000000"/>
        <ellipse cx="48" cy="48" rx="36" ry="36" fill="url(#trackball-gradient)" stroke="#888888"/>
      </svg>
