    '&TB1_mouse':  { tap: '$$trackball_19mm$$', hold: 'Mouse' }
    '&TB1_scroll':  { tap: '$$trackball_19mm$$', hold: 'Scroll' }
    '&TB2_mouse':  { tap: '$$trackball_14mm$$', hold: 'Mouse' }
    '&TB2_scroll':  { tap: '$$trackball_14mm$$', hold: 'Scroll' }
