draw_config:
  n_columns: 2
  draw_key_sides: true
  append_colon_to_layer_header: true
  small_pad: 4.0
  key_w: 60.0
  key_h: 56.0
  split_gap: 30.0
  combo_w: 28.0
  combo_h: 26.0
  key_rx: 6.0
  key_ry: 6.0
  dark_mode: auto
  n_columns: 1
  separate_combo_diagrams: false
  combo_diagrams_scale: 2
  inner_pad_w: 1.0
  inner_pad_h: 1.0
  outer_pad_w: 30.0
  outer_pad_h: 56.0
  line_spacing: 1.2
  arc_radius: 6.0
  append_colon_to_layer_header: true
  small_pad: 2.0
  legend_rel_x: 0.0
  legend_rel_y: 0.0
  draw_key_sides: true
  key_side_pars:
    rel_x: 0
    rel_y: 0
    rel_w: 12
    rel_h: 12
    rx: 8
    ry: 8
  svg_extra_style: |
    svg.keymap {
      background-color: #434343 !important; /* 全体の背景色 */
      font-family: Ubuntu Mono, Inconsolata, Consolas, Liberation Mono, Menlo, monospace;
      font-size: 14px;
      font-weight: bold;
      text-rendering: optimizeLegibility;
    }
    rect.key {
      fill: #FFFFFF !important;      /* キーの色 */
      stroke: #C0C0C0 !important;    /* 枠線の色 */
      stroke-width: 2px;
    }
    /* 押下とコンボ */
    rect.held, rect.combo.held {
      fill: #D3FF89 !important;      /* キーの色 */
      stroke: #B3DF69 !important;    /* 枠線の色 */
      stroke-width: 2.0;
    }
    /* トラボ */
    .key:has(use[href^="#trackball_"]) text.hold {
      fill: #000000 !important;
      font-size: 12px !important;
      font-weight: bold !important;
      display: block !important;
      transform: translate(0px, -10px) !important;
    }
    /* エンコーダ */
    .key:has(use[href="#rotaryencoder"]) text.hold {
      fill: #000000 !important;
      font-size: 12px !important;
      font-weight: bold !important;
      display: block !important;
      transform: translate(0px, -20px) !important;
    }

  footer_text: Created with <a href="https://github.com/caksoylar/keymap-drawer">keymap-drawer</a>
  shrink_wide_legends: 7
  style_layer_activators: true
  glyph_tap_size: 58
  glyph_hold_size: 12
  glyph_shifted_size: 10
  glyphs:
